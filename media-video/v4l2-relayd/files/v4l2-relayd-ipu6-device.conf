[Unit]
# Bind to IPU6 PSYS device node — generic, no hardcoded PCI path.
# BindsTo stops the service if the device disappears (suspend/resume);
# the udev rule re-triggers the start when it reappears.
BindsTo=dev-ipu\x2dpsys0.device
After=dev-ipu\x2dpsys0.device

[Service]
# Clear inherited ExecStartPre (test -c /dev/media0, sleep 2)
ExecStartPre=
# Brief settle time for firmware DSP init after probe completes
ExecStartPre=/bin/sleep 1
Restart=on-failure
RestartSec=5s
